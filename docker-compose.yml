services:
  postgres:
    image: postgres:15
    container_name: frameclash_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: frameclash
    ports:
      - "8432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: frameclash_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: